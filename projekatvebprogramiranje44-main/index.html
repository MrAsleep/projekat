<!doctype html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BMI kalkulator pacijenata</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container py-5">
    <div class="app-box p-4 p-md-5">

      <div class="d-flex justify-content-end mb-2">
        <a href="logout.php" class="btn btn-outline-danger btn-sm">Odjavi se</a>
      </div>

      <div class="text-center mb-4">
        <h1 class="main-title">BMI kalkulator pacijenata</h1>

        <p class="text-muted mb-0">
          Dodavanje pacijenata, BMI računanje, filtriranje i sortiranje
        </p>
      </div>

      <div class="d-flex flex-column flex-md-row gap-3 justify-content-center mb-4">
        <button
          id="btnDodajPacijenta"
          class="btn btn-primary btn-lg px-4"
          type="button"
        >
          Dodaj pacijenta
        </button>

        <button
          id="btnPrikaziPacijente"
          class="btn btn-outline-dark btn-lg px-4"
          type="button"
        >
          Prikaži pacijente
        </button>
      </div>

      <section id="formaSekcija">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">

            <h3 class="mb-4">Unos pacijenta</h3>

            <form
              id="patientForm"
              class="row g-3"
              enctype="multipart/form-data"
            >

              <div class="col-12 col-md-6">
                <label for="ime" class="form-label">Ime i prezime</label>

                <input
                  type="text"
                  id="ime"
                  name="ime"
                  class="form-control"
                  placeholder="Unesi ime i prezime"
                />
              </div>

              <div class="col-12 col-md-3">
                <label for="godine" class="form-label">Godine</label>

                <input
                  type="number"
                  id="godine"
                  name="godine"
                  class="form-control"
                  placeholder="Npr. 25"
                />
              </div>

              <div class="col-12 col-md-3">
                <label class="form-label d-block">Pol</label>

                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="pol"
                    id="muski"
                    value="Muški"
                    checked
                  />
                  <label class="form-check-label" for="muski">Muški</label>
                </div>

                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="pol"
                    id="zenski"
                    value="Ženski"
                  />
                  <label class="form-check-label" for="zenski">Ženski</label>
                </div>
              </div>

              <div class="col-12 col-md-6">
                <label for="visina" class="form-label">Visina (m)</label>

                <input
                  type="number"
                  step="0.01"
                  id="visina"
                  name="visina"
                  class="form-control"
                  placeholder="Npr. 1.75"
                />
              </div>

              <div class="col-12 col-md-6">
                <label for="tezina" class="form-label">Težina (kg)</label>

                <input
                  type="number"
                  step="0.1"
                  id="tezina"
                  name="tezina"
                  class="form-control"
                  placeholder="Npr. 72"
                />
              </div>

              <div class="col-12 col-md-6">
                <label for="slika" class="form-label">Slika pacijenta</label>

                <input
                  type="file"
                  id="slika"
                  name="slika"
                  class="form-control"
                  accept="image/*"
                />
              </div>

              <div class="col-12">
                <label for="napomena" class="form-label">Napomena</label>

                <textarea
                  id="napomena"
                  name="napomena"
                  class="form-control"
                  rows="3"
                  placeholder="Dodatna napomena"
                ></textarea>
              </div>

              <div class="col-12 d-flex flex-column flex-sm-row gap-2">
                <button type="submit" class="btn btn-success px-4">
                  Sačuvaj pacijenta
                </button>

                <button type="reset" class="btn btn-secondary px-4">
                  Reset
                </button>
              </div>

            </form>

          </div>
        </div>
      </section>

      <section id="pacijentiSekcija" class="d-none mt-4">

        <div class="card border-0 shadow-sm rounded-4 mb-4">
          <div class="card-body p-4">

            <div class="row g-3 align-items-end">

              <div class="col-12 col-md-4">
                <label for="filterKategorija" class="form-label">
                  Filtriraj po kategoriji
                </label>

                <select id="filterKategorija" class="form-select">
                  <option value="Sve">Sve</option>
                  <option value="Pothranjenost">Pothranjenost</option>
                  <option value="Normalna težina">Normalna težina</option>
                  <option value="Prekomerna težina">Prekomerna težina</option>
                  <option value="Gojaznost">Gojaznost</option>
                </select>
              </div>

              <div class="col-12 col-md-4">
                <label for="sortiranje" class="form-label">
                  Sortiranje po BMI
                </label>

                <select id="sortiranje" class="form-select">
                  <option value="default">Bez sortiranja</option>
                  <option value="min-max">Od min ka max</option>
                  <option value="max-min">Od max ka min</option>
                </select>
              </div>

              <div class="col-12 col-md-4">
                <button
                  id="btnPrimeni"
                  class="btn btn-primary w-100"
                  type="button"
                >
                  Primeni
                </button>
              </div>

            </div>

          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <h3 class="mb-0">Lista pacijenata</h3>

          <span id="brojPacijenata" class="badge text-bg-primary fs-6">
            0 pacijenata
          </span>
        </div>

        <div id="patientsContainer" class="row g-4"></div>

      </section>

    </div>
  </div>

  <div class="modal fade" id="modalUredi" tabindex="-1" aria-labelledby="modalUrediLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalUrediLabel">Uredi pacijenta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Zatvori"></button>
        </div>
        <div class="modal-body">
          <form id="editForm" class="row g-3" enctype="multipart/form-data">
            <input type="hidden" id="editId" name="id" />

            <div class="col-12 col-md-6">
              <label for="editIme" class="form-label">Ime i prezime</label>
              <input type="text" id="editIme" name="ime" class="form-control" />
            </div>

            <div class="col-12 col-md-3">
              <label for="editGodine" class="form-label">Godine</label>
              <input type="number" id="editGodine" name="godine" class="form-control" />
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label d-block">Pol</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="pol" id="editMuski" value="Muški" />
                <label class="form-check-label" for="editMuski">Muški</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="pol" id="editZenski" value="Ženski" />
                <label class="form-check-label" for="editZenski">Ženski</label>
              </div>
            </div>

            <div class="col-12 col-md-6">
              <label for="editVisina" class="form-label">Visina (m)</label>
              <input type="number" step="0.01" id="editVisina" name="visina" class="form-control" />
            </div>

            <div class="col-12 col-md-6">
              <label for="editTezina" class="form-label">Težina (kg)</label>
              <input type="number" step="0.1" id="editTezina" name="tezina" class="form-control" />
            </div>

            <div class="col-12 col-md-6">
              <label for="editSlika" class="form-label">Nova slika pacijenta (opcionalno)</label>
              <input type="file" id="editSlika" name="slika" class="form-control" accept="image/*" />
            </div>

            <div class="col-12">
              <label for="editNapomena" class="form-label">Napomena</label>
              <textarea id="editNapomena" name="napomena" class="form-control" rows="3"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Otkaži</button>
          <button type="button" class="btn btn-success" id="btnSacuvajIzmene">Sačuvaj izmene</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
